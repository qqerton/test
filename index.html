<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Magic Button</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
    }

    .card {
      width: 320px;
      height: 200px;
      border-radius: 24px;
      background: rgba(25, 25, 35, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.8s ease, opacity 0.8s ease, filter 0.8s ease;
    }

    .card.hide {
      opacity: 0;
      transform: scale(0.8);
      filter: blur(10px);
    }

    .magic-btn {
      position: relative;
      padding: 16px 36px;
      border: none;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #8a63ff, #3ddcff);
      cursor: pointer;
      box-shadow: 0 0 20px rgba(138, 99, 255, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
      z-index: 2;
    }

    .magic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 28px rgba(61, 220, 255, 0.55);
    }

    .magic-btn:active {
      transform: scale(0.96);
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px white, 0 0 20px #8ef7ff;
      pointer-events: none;
      opacity: 0;
      animation: sparkleBurst 0.9s ease-out forwards;
    }

    @keyframes sparkleBurst {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
      }
    }

    .message {
      position: absolute;
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .message.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <button class="magic-btn" id="magicBtn">누르기</button>
    <div class="message" id="message">사라졌습니다</div>
  </div>

  <script>
    const button = document.getElementById("magicBtn");
    const card = document.getElementById("card");
    const message = document.getElementById("message");

    button.addEventListener("click", () => {
      button.disabled = true;
      createSparkles(button, 28);

      setTimeout(() => {
        button.style.opacity = "0";
        button.style.transform = "scale(0.5)";
      }, 250);

      setTimeout(() => {
        card.classList.add("hide");
      }, 700);

      setTimeout(() => {
        message.classList.add("show");
      }, 1200);
    });

    function createSparkles(target, count) {
      const rect = target.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();

      const centerX = rect.left - cardRect.left + rect.width / 2;
      const centerY = rect.top - cardRect.top + rect.height / 2;

      for (let i = 0; i < count; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 80;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        sparkle.style.left = `${centerX}px`;
        sparkle.style.top = `${centerY}px`;
        sparkle.style.setProperty("--x", `${x}px`);
        sparkle.style.setProperty("--y", `${y}px`);

        card.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 1000);
      }
    }
  </script>
</body>
</html>
